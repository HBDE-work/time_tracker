name: Build & Test

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    check-commit:
        runs-on: ubuntu-latest
        outputs:
            proceed: ${{ steps.check.outputs.proceed }}
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Check commit message
              id: check
              run: |
                  MSG=$(git log -1 --pretty=%B)
                  echo "Commit message: $MSG"
                  if [[ "$MSG" == *"[testbuild]"* ]]; then
                    echo "proceed=true" >> $GITHUB_OUTPUT
                  else
                    echo "proceed=false" >> $GITHUB_OUTPUT
                  fi

    build-and-test:
        needs: check-commit
        if: needs.check-commit.outputs.proceed == 'true'
        runs-on: ubuntu-latest
        container:
            image: rust:1.95

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Cache cargo registry
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache target directory
              uses: actions/cache@v3
              with:
                  path: target
                  key: cargo-target-${{ github.sha }}

            - name: Setup Rust environment
              uses: ./.github/actions/setup-rust-env
              with:
                  cache-key-suffix: "-dev"
                  install-mingw: "true"

            - name: Run lint checks
              run: cargo make lint

            - name: Run tests
              run: cargo make test

            - name: Build and package
              run: cargo make package

            - name: Set artifact name base
              id: vars
              shell: bash
              run: |
                  BRANCH="${GITHUB_REF_NAME//\//-}"
                  if [ -n "${{ github.event.pull_request.number }}" ]; then
                      echo "NAME=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
                  else
                      echo "NAME=$BRANCH" >> $GITHUB_OUTPUT
                  fi

            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux-pr-${{ steps.vars.outputs.NAME }}--${{ github.sha }}
                  path: |
                      dist/*linux*.zip
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: windows-pr-${{ steps.vars.outputs.NAME }}--${{ github.sha }}
                  path: |
                      dist/*windows*.zip
                  if-no-files-found: warn
                  retention-days: 7
