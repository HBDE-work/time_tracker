name: Build & Test

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    check-commit:
        runs-on: ubuntu-latest
        outputs:
            proceed: ${{ steps.commitcheck.outputs.proceed }}
        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Base run decision on last commit message
              id: commitcheck
              run: |
                  MSG=$(git log -1 --pretty=%B)
                  echo "Last commit message: $MSG"

                  PR_TITLE="${{ github.event.pull_request.title }}"

                  PROCEED=false
                  if [ "${{ github.event_name }}" == "push" ]; then
                    PROCEED=true
                  fi

                  if [ "${{ github.event_name }}" == "pull_request" ]; then
                    if [[ "$MSG" == *"[testbuild]"* ]] || [[ "$PR_TITLE" == *"[testbuild]"* ]]; then
                        PROCEED=true
                    fi
                  fi

                  echo "proceed=$PROCEED" >> $GITHUB_OUTPUT

    build-and-test:
        needs: check-commit
        if: needs.check-commit.outputs.proceed == 'true'
        runs-on: ubuntu-latest
        container:
            image: rust:1.95
        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Cache cargo registry
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache target directory
              uses: actions/cache@v3
              with:
                  path: target
                  key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

            - name: Setup Rust environment
              uses: ./.github/actions/setup-rust-env
              with:
                  cache-key-suffix: "-dev"
                  install-mingw: "true"

            - name: Run lint checks
              run: cargo make lint

            - name: Run tests
              run: cargo make test

            - name: Build and package
              run: cargo make package

            - name: Set artifact name base
              id: vars
              shell: bash
              run: |
                  BRANCH="${GITHUB_REF_NAME//\//-}"
                  if [ -n "${{ github.event.pull_request.number }}" ]; then
                    echo "NAME=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
                  else
                    echo "NAME=$BRANCH" >> $GITHUB_OUTPUT

            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux-pr-${{ steps.vars.outputs.NAME }}--${{ github.sha }}
                  path: dist/*linux*.zip
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: windows-pr-${{ steps.vars.outputs.NAME }}--${{ github.sha }}
                  path: dist/*windows*.zip
                  if-no-files-found: warn
                  retention-days: 7
